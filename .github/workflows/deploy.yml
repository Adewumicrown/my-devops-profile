name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 966001266659.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: html-app
  EC2_HOST: 44.201.21.34
  EC2_USER: ubuntu
  IMAGE_NAME: html-app

jobs:
  ##############################################
  # JOB 1 — BUILD & TEST
  ##############################################
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:latest .

      - name: Test — container starts and serves content
        run: |
          docker run -d --name test-container -p 8080:80 $IMAGE_NAME:latest
          sleep 5
          curl --fail http://localhost:8080 | grep -i "Adebayo"
          docker stop test-container
          docker rm test-container

  ##############################################
  # JOB 2 — PUSH TO ECR
  ##############################################
  push:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build, tag and push image to ECR
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:latest $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

  ##############################################
  # JOB 3 — DEPLOY TO EC2
  ##############################################
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: push

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            # Login to ECR
            aws ecr get-login-password --region us-east-1 | \
            sudo docker login --username AWS --password-stdin 966001266659.dkr.ecr.us-east-1.amazonaws.com

            # Pull latest image
            sudo docker pull 966001266659.dkr.ecr.us-east-1.amazonaws.com/html-app:latest

            # Stop and remove old container if running
            sudo docker stop devops-profile || true
            sudo docker rm devops-profile || true

            # Run new container
            sudo docker run -d \
              --name devops-profile \
              --restart always \
              -p 80:80 \
              966001266659.dkr.ecr.us-east-1.amazonaws.com/html-app:latest

            # Verify it's running
            sudo docker ps | grep devops-profile
